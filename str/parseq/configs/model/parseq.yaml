name: parseq
_target_: strhub.models.parseq.system.PARSeq

# Data
patch_size: [ 4, 8 ]  # [ height, width ]

# Architecture
embed_dim: 384
enc_num_heads: 6
enc_mlp_ratio: 4
enc_depth: 12
dec_num_heads: 12
dec_mlp_ratio: 4
dec_depth: 1

# Training
lr: 7e-4
perm_num: 6
perm_forward: true
perm_mirrored: true
dropout: 0.1

# Decoding mode (test)
decode_ar: true
refine_iters: 1

# Jersey multi-task aux heads on encoder (training only; inference unchanged PARSeq decode)
use_jersey_aux_heads: false
aux_alpha_full: 0.25
aux_alpha_tens: 0.15
aux_alpha_units: 0.15
aux_alpha_count: 0.2
